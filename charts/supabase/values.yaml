## Supabase Helm Chart Configuration
##
## Supabase is composed of multiple services running together
## to provide a full backend platform. This chart deploys and
## configures the following components:
##
## - Kong (API Gateway)
## - Studio (Admin UI)
## - Postgres (Database)
## - PostgREST (REST API)
## - Realtime (WebSocket server)
## - Storage API
## - Postgres Meta
## - GoTrue (Authentication)
## - Edge Functions (Deno runtime)
## - Logflare (Analytics)
## - Vector (Logs pipeline)
## - Imgproxy (Image transformation)
## - MinIO (S3-compatible storage)
##
## This chart mirrors the official Supabase
## Docker setup, adapted for Kubernetes.
##
## Reference:
## https://github.com/supabase/supabase/tree/master/docker
##
## Configuration is grouped by domain rather than by component.
## Each section contains per-component blocks where applicable.
##
##  1. secret         - All credentials and sensitive values
##  2. deployment     - Pod configuration per component
##  3. image          - Container image settings per component
##  4. environment    - Environment variables per component
##  5. persistence    - PVC configuration per component
##  6. service        - Kubernetes Service configuration per component
##  7. autoscaling    - HPA configuration per component
##  8. ingress        - External access configuration
##  9. serviceAccount - ServiceAccount configuration per component
## 10. bigQuery       - Optional BigQuery backend configuration
## 11. cnpg           - CloudNativePG-managed PostgreSQL cluster
## 12. gateway        - Optional Gateway API HTTPRoute (alpha)

secret:
  ## JSON Web Tokens + asymmetric API keys
  ## Used to sign and validate access tokens across all Supabase services.
  ## A pre-install Job (jwt-generator) generates the following keys on first
  ## install and writes them into a single Secret `<release>-supabase-jwt`:
  ##   secret, anonKey, serviceKey                (HS256 legacy)
  ##   anonKeyAsymmetric, serviceKeyAsymmetric    (ES256)
  ##   publishableKey, secretKey                  (opaque sb_* keys)
  ##   jwtKeys, jwtJwks                           (EC JWKS)
  ## Existing Secrets are left untouched, so keys never rotate implicitly.
  ## Docs: https://supabase.com/docs/guides/self-hosting/self-hosted-auth-keys
  ##
  jwt:
    ## Reference to an existing Secret with pre-populated keys (see list above).
    ## When set (non-empty), the generator Job is skipped and services read
    ## all keys from this Secret.
    secretRef: ""

    ## Map to actual key names inside secretRef if they differ from the
    ## defaults (anonKey, serviceKey, secret, publishableKey, secretKey,
    ## anonKeyAsymmetric, serviceRoleKeyAsymmetric, jwtKeys, jwtJwks).
    # secretRefKey:
    #   anonKey: anonKey
    #   serviceKey: serviceKey
    #   secret: secret

  ## PostgreSQL credentials
  ##
  ## A pre-install Job generates one alphanumeric password per Postgres role
  ## (postgres, supabase_admin, authenticator, pgbouncer, supabase_auth_admin,
  ## supabase_storage_admin, supabase_functions_admin) and writes each into a
  ## separate `kubernetes.io/basic-auth` Secret named
  ## `<release>-db-<role-with-dashes>`. CNPG consumes those directly and the
  ## Supabase services each read the password of the role they connect as.
  ## Passwords never rotate once generated — missing Secrets are filled in,
  ## existing ones are left untouched.
  ##
  db:
    ## Database name used by CNPG initdb.
    database: "postgres"

    ## Bring-your-own per-role Secrets. Each value, if non-empty, must name an
    ## existing Secret of type `kubernetes.io/basic-auth` with keys
    ## `username` (= role name) and `password`. Listed roles whose entry is
    ## empty are auto-generated by the db-generator Job.
    existingSecrets: {}
    #   postgres: ""
    #   supabase_admin: ""
    #   authenticator: ""
    #   pgbouncer: ""
    #   supabase_auth_admin: ""
    #   supabase_storage_admin: ""
    #   supabase_functions_admin: ""

  ## Logflare credentials
  ##
  analytics:
    publicAccessToken: "your-super-secret-and-long-logflare-key-public"
    privateAccessToken: "your-super-secret-and-long-logflare-key-private"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   publicAccessToken: publicAccessToken
    #   privateAccessToken: privateAccessToken

  ## BigQuery service account credentials
  ## Used by Logflare when analytics backend is set to BigQuery
  ##
  bigquery:
    gcloudJson: ""

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   gcloudJson: gcloud.json

  ## SMTP credentials
  ##
  smtp:
    username: "fake_mail_user"
    password: "fake_mail_password"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   username: username
    #   password: password

  ## Studio dashboard credentials
  ##
  dashboard:
    username: "supabase"
    password: "this_password_is_insecure_and_should_be_updated"
    openAiApiKey: "key_super_secret"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   username: username
    #   password: password
    #   openAiApiKey: openAiApiKey

  ## S3-compatible credentials
  ##
  s3:
    keyId: "625729a08b95bf1b7ff351a663f3a23c"
    accessKey: "850181e4652dd023b7a98c58ae0d2d34bd487ee0cc3254aed6eda37307425907"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   keyId: keyId
    #   accessKey: accessKey

  ## Realtime service
  ## Docs: https://supabase.com/docs/guides/realtime
  ##
  realtime:
    ## Used by Supabase Realtime (Phoenix) to sign and encrypt internal data,
    ## sessions and tokens. Equivalent to Phoenix SECRET_KEY_BASE.
    ## Generate with: openssl rand -base64 64
    secretKeyBase: "UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   secretKeyBase: secretKeyBase

  ## Meta service
  ## Docs: https://github.com/supabase/postgres-meta
  ##
  meta:
    ## Used to encrypt sensitive metadata at rest.
    ## Generate with: openssl rand -hex 32
    cryptoKey: "your-encryption-key-32-chars-min"

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   cryptoKey: cryptoKey

  minio:
    user: supa-storage
    password: secret1234

    ## Reference to existing secret
    # secretRef: ""

    ## Map to actual keys inside secretRef if they differ
    # secretRefKey:
    #   user: user
    #   password: password

