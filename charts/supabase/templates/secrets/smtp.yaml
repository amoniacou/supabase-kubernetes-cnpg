{{- if .Values.secret.smtp }}
{{- if not .Values.secret.smtp.secretRef }}
# SMTP is bring-your-own — GoTrue reads `username`/`password` unconditionally,
# so the keys must exist even when blank. Leave values empty to disable
# outbound mail (GoTrue will refuse SMTP sends but still boot).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supabase.secret.smtp" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.secret.smtp.username | default "" | b64enc | quote }}
  password: {{ .Values.secret.smtp.password | default "" | b64enc | quote }}
{{- end }}
{{- end }}
