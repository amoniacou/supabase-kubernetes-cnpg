{{- if .Values.deployment.kong.enabled -}}
{{- if .Values.gateway.enabled -}}
{{- $fullName := include "supabase.kong.fullname" . -}}
{{- $svcPort := .Values.service.kong.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.gateway.parentRefs }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - name: traefik
      namespace: traefik
      sectionName: web
    {{- end }}
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
{{- end }}
