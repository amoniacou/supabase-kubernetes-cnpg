{{- if .Values.deployment.kong.enabled -}}
{{- $authSvc     := printf "http://%s:%d" (include "supabase.auth.fullname" .)     (int .Values.service.auth.port)     -}}
{{- $restSvc     := printf "http://%s:%d" (include "supabase.rest.fullname" .)     (int .Values.service.rest.port)     -}}
{{- $realtimeSvc := printf "http://%s:%d" (include "supabase.realtime.fullname" .) (int .Values.service.realtime.port) -}}
{{- $storageSvc  := printf "http://%s:%d" (include "supabase.storage.fullname" .)  (int .Values.service.storage.port)  -}}
{{- $functionsSvc := printf "http://%s:%d" (include "supabase.functions.fullname" .) (int .Values.service.functions.port) -}}
{{- $metaSvc     := printf "http://%s:%d" (include "supabase.meta.fullname" .)     (int .Values.service.meta.port)     -}}
{{- $studioSvc   := printf "http://%s:%d" (include "supabase.studio.fullname" .)   (int .Values.service.studio.port)   -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "supabase.kong.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
data:
  # Mirrors docker/volumes/api/kong-entrypoint.sh from the supabase/supabase
  # repo: builds Lua expressions for the Authorization/x-api-key rewrites and
  # substitutes env vars into temp.yml with awk (sed/eval would strip YAML
  # quoting and break "Header: value" mappings).
  kong-entrypoint.sh: |
    #!/bin/bash
    set -eu

    if [ -n "${SUPABASE_SECRET_KEY:-}" ] && [ -n "${SUPABASE_PUBLISHABLE_KEY:-}" ]; then
      export LUA_AUTH_EXPR="\$((headers.authorization ~= nil and headers.authorization:sub(1, 10) ~= 'Bearer sb_' and headers.authorization) or (headers.apikey == '${SUPABASE_SECRET_KEY}' and 'Bearer ${SERVICE_ROLE_KEY_ASYMMETRIC}') or (headers.apikey == '${SUPABASE_PUBLISHABLE_KEY}' and 'Bearer ${ANON_KEY_ASYMMETRIC}') or headers.apikey)"
      export LUA_RT_WS_EXPR="\$((query_params.apikey == '${SUPABASE_SECRET_KEY}' and '${SERVICE_ROLE_KEY_ASYMMETRIC}') or (query_params.apikey == '${SUPABASE_PUBLISHABLE_KEY}' and '${ANON_KEY_ASYMMETRIC}') or query_params.apikey)"
    else
      export LUA_AUTH_EXPR="\$((headers.authorization ~= nil and headers.authorization:sub(1, 10) ~= 'Bearer sb_' and headers.authorization) or headers.apikey)"
      export LUA_RT_WS_EXPR="\$(query_params.apikey)"
    fi

    awk '{
      result = ""
      rest = $0
      while (match(rest, /\$[A-Za-z_][A-Za-z_0-9]*/)) {
        varname = substr(rest, RSTART + 1, RLENGTH - 1)
        if (varname in ENVIRON) {
          result = result substr(rest, 1, RSTART - 1) ENVIRON[varname]
        } else {
          result = result substr(rest, 1, RSTART + RLENGTH - 1)
        }
        rest = substr(rest, RSTART + RLENGTH)
      }
      print result rest
    }' /home/kong/temp.yml > "$KONG_DECLARATIVE_CONFIG"

    # Drop any key-auth credentials entries whose key substituted to empty
    # (unconfigured opaque keys).
    sed -i '/^[[:space:]]*- key:[[:space:]]*$/d' "$KONG_DECLARATIVE_CONFIG"

    exec /entrypoint.sh kong docker-start
  temp.yml: |
    _format_version: '2.1'
    _transform: true

    consumers:
    {{- if .Values.secret.dashboard }}
      - username: DASHBOARD
    {{- end }}
      - username: anon
        keyauth_credentials:
          - key: $SUPABASE_ANON_KEY
          - key: $SUPABASE_PUBLISHABLE_KEY
      - username: service_role
        keyauth_credentials:
          - key: $SUPABASE_SERVICE_KEY
          - key: $SUPABASE_SECRET_KEY

    acls:
      - consumer: anon
        group: anon
      - consumer: service_role
        group: admin

    {{- if .Values.secret.dashboard }}
    basicauth_credentials:
      - consumer: DASHBOARD
        username: '$DASHBOARD_USERNAME'
        password: '$DASHBOARD_PASSWORD'
    {{- end }}

    services:
    {{- if .Values.deployment.auth.enabled }}
      ## Open Auth routes
      - name: auth-v1-open
        url: {{ $authSvc }}/verify
        routes:
          - name: auth-v1-open
            strip_path: true
            paths:
              - /auth/v1/verify
        plugins:
          - name: cors
      - name: auth-v1-open-callback
        url: {{ $authSvc }}/callback
        routes:
          - name: auth-v1-open-callback
            strip_path: true
            paths:
              - /auth/v1/callback
        plugins:
          - name: cors
      - name: auth-v1-open-authorize
        url: {{ $authSvc }}/authorize
        routes:
          - name: auth-v1-open-authorize
            strip_path: true
            paths:
              - /auth/v1/authorize
        plugins:
          - name: cors
      - name: auth-v1-open-jwks
        url: {{ $authSvc }}/.well-known/jwks.json
        routes:
          - name: auth-v1-open-jwks
            strip_path: true
            paths:
              - /auth/v1/.well-known/jwks.json
        plugins:
          - name: cors
      - name: auth-v1-open-sso-acs
        url: {{ $authSvc }}/sso/saml/acs
        routes:
          - name: auth-v1-open-sso-acs
            strip_path: true
            paths:
              - /sso/saml/acs
        plugins:
          - name: cors
      - name: auth-v1-open-sso-metadata
        url: {{ $authSvc }}/sso/saml/metadata
        routes:
          - name: auth-v1-open-sso-metadata
            strip_path: true
            paths:
              - /sso/saml/metadata
        plugins:
          - name: cors

      ## Secure Auth routes
      - name: auth-v1
        url: {{ $authSvc }}/
        routes:
          - name: auth-v1-all
            strip_path: true
            paths:
              - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: request-transformer
            config:
              add:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
              replace:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      ## OAuth 2.0 Authorization Server Metadata (RFC 8414)
      - name: well-known-oauth
        url: {{ $authSvc }}/.well-known/oauth-authorization-server
        routes:
          - name: well-known-oauth
            strip_path: true
            paths:
              - /.well-known/oauth-authorization-server
        plugins:
          - name: cors
    {{- end }}

    {{- if .Values.deployment.rest.enabled }}
      ## Secure PostgREST routes
      - name: rest-v1
        url: {{ $restSvc }}/
        routes:
          - name: rest-v1-all
            strip_path: true
            paths:
              - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: request-transformer
            config:
              add:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
              replace:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      ## Secure GraphQL routes
      - name: graphql-v1
        url: {{ $restSvc }}/rpc/graphql
        routes:
          - name: graphql-v1-all
            strip_path: true
            paths:
              - /graphql/v1
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: request-transformer
            config:
              add:
                headers:
                  - "Content-Profile: graphql_public"
                  - "Authorization: $LUA_AUTH_EXPR"
              replace:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
    {{- end }}

    {{- if .Values.deployment.realtime.enabled }}
      ## Secure Realtime routes
      - name: realtime-v1-ws
        url: {{ $realtimeSvc }}/socket
        protocol: ws
        routes:
          - name: realtime-v1-ws
            strip_path: true
            paths:
              - /realtime/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: request-transformer
            config:
              add:
                headers:
                  - "x-api-key: $LUA_RT_WS_EXPR"
              replace:
                querystring:
                  - "apikey: $LUA_RT_WS_EXPR"
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
      - name: realtime-v1-rest
        url: {{ $realtimeSvc }}/api
        protocol: http
        routes:
          - name: realtime-v1-rest
            strip_path: true
            paths:
              - /realtime/v1/api
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: request-transformer
            config:
              add:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
              replace:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
    {{- end }}

    {{- if .Values.deployment.storage.enabled }}
      ## Storage API (no key-auth — S3 protocol requests use SigV4 instead).
      ## request-transformer translates opaque keys; post-function strips the
      ## Authorization header if the Lua expr evaluated to empty, so S3
      ## presigned URL signature validation falls through to query params.
      - name: storage-v1
        url: {{ $storageSvc }}/
        routes:
          - name: storage-v1-all
            strip_path: true
            paths:
              - /storage/v1/
        plugins:
          - name: cors
          - name: request-transformer
            config:
              add:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
              replace:
                headers:
                  - "Authorization: $LUA_AUTH_EXPR"
          - name: post-function
            config:
              access:
                - |
                  local auth = kong.request.get_header("authorization")
                  if auth == nil or auth == "" or auth:find("^%s*$") then
                    kong.service.request.clear_header("authorization")
                  end
    {{- end }}

    {{- if .Values.deployment.functions.enabled }}
      ## Edge Functions routes
      - name: functions-v1
        url: {{ $functionsSvc }}/
        read_timeout: 150000
        routes:
          - name: functions-v1-all
            strip_path: true
            paths:
              - /functions/v1/
        plugins:
          - name: cors
    {{- end }}

    {{- if .Values.deployment.meta.enabled }}
      ## Secure pg-meta route
      - name: meta
        url: {{ $metaSvc }}/
        routes:
          - name: meta-all
            strip_path: true
            paths:
              - /pg/
        plugins:
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
    {{- end }}

      ## Block direct access to /api/mcp (upstream default; enable explicitly
      ## by replacing the request-termination plugin with cors + ip-restriction).
      - name: mcp-blocker
        url: {{ $studioSvc }}/api/mcp
        routes:
          - name: mcp-blocker-route
            strip_path: true
            paths:
              - /api/mcp
        plugins:
          - name: request-termination
            config:
              status_code: 403
              message: "Access is forbidden."
      - name: mcp
        url: {{ $studioSvc }}/api/mcp
        routes:
          - name: mcp
            strip_path: true
            paths:
              - /mcp
        plugins:
          - name: request-termination
            config:
              status_code: 403
              message: "Access is forbidden."

      ## Protected Dashboard - catch all remaining routes
      - name: dashboard
        url: {{ $studioSvc }}/
        routes:
          - name: dashboard-all
            strip_path: true
            paths:
              - /
        plugins:
          - name: cors
          {{- if .Values.secret.dashboard }}
          - name: basic-auth
            config:
              hide_credentials: true
          {{- end }}
{{- end }}
