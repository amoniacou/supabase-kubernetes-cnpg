{{- if and .Values.cnpg.enabled .Values.networkPolicy.db.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.cnpg.clusterName }}-access
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ .Values.cnpg.clusterName }}
  policyTypes:
    - Ingress
  ingress:
    # Supabase services in this release (auth, rest, realtime, storage, meta,
    # functions, analytics) connect to Postgres on 5432.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    # CNPG operator + sibling instances (replication, failover).
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.cnpg.clusterName }}
      ports:
        - protocol: TCP
          port: 5432
    {{- range .Values.networkPolicy.db.ingressRules }}
    - from:
        - {{ toYaml .from | indent 10 | trim }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
